// BALROG-RAPID Ceres (USDA ARS SCINet) Configuration
//
// Overlays base.config — only Ceres-specific overrides.
// Usage: nextflow run main.nf -c configs/ceres/ceres.cfg --slurm_account <group>

params {
    config_profile_description = 'Ceres - USDA ARS SCINet'
    config_profile_contact     = 'Edward Bird'
    config_profile_url         = 'https://github.com/edwardbirdlab'
    max_time                   = 504.h   // 21 days (base: 24h)
}

apptainer {
    enabled     = true
    ociAutoPull = true
}

process {
    executor       = 'slurm'
    clusterOptions = {
        if (!params.slurm_account)
            throw new IllegalArgumentException("ERROR: --slurm_account is required when using the Ceres config (e.g. --slurm_account culicoides)")
        "-A ${params.slurm_account}"
    }
    errorStrategy  = { sleep(200); return 'retry' }
    maxRetries     = 2
}
